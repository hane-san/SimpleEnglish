<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Frog English Subject Drill 500</title>
<meta name="theme-color" content="#142b46">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Subject Drill">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#f2e8d7; --paper:#fffaf0; --paper2:#f8eedc; --ink:#1f2530; --muted:#736650;
    --navy:#142b46; --navy2:#203f63; --brass:#b68a3f; --brass2:#d9be78; --ox:#74312f;
    --line:rgba(182,138,63,.58); --shadow:0 10px 26px rgba(20,43,70,.11), 0 1px 0 rgba(255,255,255,.78) inset;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,"Noto Sans JP",sans-serif}
  button{font-family:inherit;-webkit-tap-highlight-color:transparent}
  body{padding-bottom:calc(24px + env(safe-area-inset-bottom));background:linear-gradient(90deg,rgba(20,43,70,.028) 1px,transparent 1px),linear-gradient(180deg,#f7efe2,#eadcc8);background-size:18px 18px,auto}
  .top{position:sticky;top:0;z-index:20;padding:calc(8px + env(safe-area-inset-top)) 10px 9px;background:linear-gradient(180deg,rgba(246,236,219,.98),rgba(242,232,215,.94));backdrop-filter:blur(12px);border-bottom:1px solid var(--line);box-shadow:0 8px 24px rgba(20,43,70,.08)}
  .titlebar{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;max-width:780px;margin:0 auto 7px}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:17px;margin:0;letter-spacing:.035em;font-weight:700;color:var(--navy);text-shadow:0 1px 0 rgba(255,255,255,.75)}
  h1:before{content:"✦ ";color:var(--brass);font-size:14px}.counter{font-family:Georgia,"Times New Roman",serif;font-size:11px;color:var(--muted);white-space:nowrap;border:1px solid rgba(182,138,63,.5);border-radius:999px;padding:3px 8px;background:rgba(255,250,240,.72)}
  .tabs{max-width:780px;margin:0 auto 8px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}.tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;border:1px solid rgba(182,138,63,.62);background:rgba(255,250,240,.88);color:#4b412f;border-radius:999px;padding:7px 9px;font-weight:850;font-size:11px;box-shadow:0 2px 8px rgba(54,43,25,.045)}
  .tab.active{background:linear-gradient(180deg,var(--navy2),var(--navy));border-color:var(--navy);color:#fff7e9;box-shadow:0 3px 12px rgba(20,43,70,.2)}
  .controls{max-width:780px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.ctrl{border:1px solid rgba(182,138,63,.62);background:var(--paper);color:var(--ink);padding:9px 8px;border-radius:13px;font-size:12.5px;font-weight:850;box-shadow:0 3px 10px rgba(54,43,25,.055)}.ctrl.active{background:linear-gradient(180deg,#f8f0df,#eadbbd);border-color:var(--brass);color:#382a16}
  .hint{max-width:780px;margin:8px auto 0;color:var(--muted);font-size:10.8px;line-height:1.45}.wrap{max-width:780px;margin:10px auto 0;padding:0 8px}.cards{display:flex;flex-direction:column;gap:8px}
  .card{position:relative;display:grid;grid-template-columns:40px minmax(0,1fr);align-items:stretch;min-height:66px;background:linear-gradient(180deg,rgba(255,250,240,.99),rgba(248,238,220,.99));border:1px solid rgba(182,138,63,.66);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.card:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--navy),var(--ox));opacity:.86}
  .hold{appearance:none;border:0;border-right:1px solid rgba(182,138,63,.46);background:linear-gradient(180deg,#f3e8d5,#e4cea4);display:flex;align-items:center;justify-content:center;color:transparent;font-size:0;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-user-drag:none;padding:0;position:relative}.hold:before{content:"";width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 32%,#fff8e7 0 20%,#dcc187 22% 44%,#8e6428 46% 100%);border:1px solid rgba(66,47,23,.46);box-shadow:0 1px 0 rgba(255,255,255,.85) inset,0 2px 5px rgba(20,43,70,.23),0 0 0 3px rgba(182,138,63,.13);-webkit-user-drag:none}.hold:after{content:"";position:absolute;width:9px;height:9px;border-radius:50%;border:1px solid rgba(20,43,70,.34);background:rgba(255,250,240,.43);-webkit-user-drag:none}.hold:active,.hold.on{background:linear-gradient(180deg,#ead9b7,#dec392)}.hold:active:before,.hold.on:before{background:radial-gradient(circle at 36% 32%,#fffdf0 0 18%,#ead7a7 20% 42%,#9a6e2e 44% 100%);box-shadow:0 1px 0 rgba(255,255,255,.85) inset,0 0 0 4px rgba(182,138,63,.16),0 3px 8px rgba(20,43,70,.22)}
  .content{position:relative;min-width:0;padding:7px 8px 8px 9px}.meta{font-size:9.8px;line-height:1.1;color:var(--muted);letter-spacing:.035em;display:flex;gap:5px;align-items:center;white-space:nowrap}.badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:2px 5px;border-radius:999px;background:#ecf1ee;color:var(--navy2);border:1px solid rgba(20,43,70,.13);font-weight:900;font-variant-numeric:tabular-nums}
  .jp{margin-top:5px;font-size:clamp(11px,2.9vw,13.15px);line-height:1.29;font-weight:760;letter-spacing:-.03em;font-feature-settings:"palt" 1;white-space:normal;overflow:visible;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:keep-all;overflow-wrap:anywhere}.bracket{color:var(--ox);background:linear-gradient(180deg,rgba(182,138,63,.19),rgba(182,138,63,.08));border-radius:5px;padding:0 .08em;box-decoration-break:clone;-webkit-box-decoration-break:clone;white-space:nowrap}
  .en{display:none;margin-top:6px;padding:6px 8px;border-radius:11px;background:linear-gradient(180deg,#fbf4e8,#efe0c3);border:1px solid rgba(182,138,63,.52);color:#17314e;font-family:"Avenir Next Condensed","HelveticaNeue-CondensedBold","Arial Narrow",Georgia,"Times New Roman",serif;font-size:clamp(9.7px,2.38vw,11.35px);line-height:1.28;font-weight:760;letter-spacing:-.01em;white-space:normal;overflow:visible;text-overflow:clip;word-break:normal;overflow-wrap:anywhere}.card.reveal .en{display:block}
  .zones{position:absolute;inset:0 0 0 40px;display:grid;grid-template-columns:1fr 1fr 1fr;pointer-events:none}.zone{pointer-events:auto;border:0;background:transparent;padding:0;min-width:0;touch-action:manipulation}.zone:active{background:rgba(20,43,70,.075)}.voiceflash{position:fixed;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;z-index:50;background:linear-gradient(180deg,var(--navy2),var(--navy));color:#fff7e9;padding:9px 13px;border-radius:999px;font-size:12px;font-weight:850;box-shadow:0 8px 24px rgba(0,0,0,.22);transition:.18s ease}.voiceflash.show{opacity:1;transform:translateX(-50%) translateY(0)}.empty{color:var(--muted);padding:30px 12px;text-align:center}
  @media(min-width:700px){.cards{display:grid;grid-template-columns:1fr 1fr}.card{min-height:68px}}@media(max-width:380px){.top{padding-left:7px;padding-right:7px}.wrap{padding-left:6px;padding-right:6px}.card{grid-template-columns:38px minmax(0,1fr);min-height:64px}.zones{inset-left:38px}.content{padding-left:8px;padding-right:6px}.jp{font-size:10.55px;line-height:1.26}.en{font-size:9.25px;line-height:1.25}.hold:before{width:21px;height:21px}.meta{font-size:9.3px}.badge{min-width:26px;padding:2px 4px}}
</style>
</head>
<body>
  <div class="top"><div class="titlebar"><h1>Westminster Subject Drill</h1><div class="counter" id="counter">1–50 / 500</div></div><div class="tabs" id="tabs"></div><div class="controls"><button class="ctrl active" id="ascBtn" type="button">昇順配置</button><button class="ctrl" id="randBtn" type="button">ランダム配置</button></div><div class="hint">左の○を押している間だけ英語を表示。カード本文の左/中央/右で UK男性優先 / India男性優先（ごく僅かに早め） / US自然速度を再生します。</div></div>
  <main class="wrap"><section class="cards" id="cards"><div class="empty">カードを読み込んでいます……</div></section></main><div class="voiceflash" id="voiceflash">en-GB</div>
<script>
(function(){
  const PAGE_SIZE=50, DATA_KEY='subject-drill-data-v3';
  const BLOB_API='https://api.github.com/repos/hane-san/SimpleEnglish/git/blobs/a325f969ffe28115c9e926dfc4bfffbcd6bd1b23';
  const $tabs=document.getElementById('tabs'), $cards=document.getElementById('cards'), $counter=document.getElementById('counter'), $ascBtn=document.getElementById('ascBtn'), $randBtn=document.getElementById('randBtn'), $flash=document.getElementById('voiceflash');
  let DATA=[], currentPage=0, pageOrders=new Map(), mode=new Map(), voices=[];
  const norm=s=>(s||'').toLowerCase().replace('_','-');
  function decodeBase64Utf8(b64){const bin=atob(b64.replace(/\n/g,''));const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder('utf-8').decode(bytes)}
  function extractData(html){const m=html.match(/<script id="drill-data" type="application\/json">([\s\S]*?)<\/script>/);if(!m)throw new Error('drill-data not found');return JSON.parse(m[1])}
  async function loadData(){try{const cached=localStorage.getItem(DATA_KEY);if(cached)return JSON.parse(cached)}catch(e){} const res=await fetch(BLOB_API,{cache:'force-cache'}); if(!res.ok) throw new Error('GitHub blob fetch failed'); const blob=await res.json(); const data=extractData(decodeBase64Utf8(blob.content)); try{localStorage.setItem(DATA_KEY,JSON.stringify(data))}catch(e){} return data}
  function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[]} if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices}
  function chooseVoice(lang,preferred){if(!voices.length)loadVoices();const exact=voices.filter(v=>norm(v.lang)===norm(lang));const loose=voices.filter(v=>norm(v.lang).startsWith(lang.slice(0,2).toLowerCase()));const pool=exact.length?exact:loose;for(const key of preferred){const found=pool.find(v=>norm(v.name).includes(key));if(found)return found}return pool[0]||null}
  function speak(text,kind){if(!('speechSynthesis'in window))return;const cfg={gb:{lang:'en-GB',label:'UK male / en-GB',rate:.96,preferred:['daniel','oliver','arthur','george','harry']},in:{lang:'en-IN',label:'India male / en-IN',rate:1.04,preferred:['rishi','ravi','raj','aarav','amit','kunal']},us:{lang:'en-US',label:'US natural / en-US',rate:.96,preferred:['tom','alex','aaron','nathan','samantha','ava','allison']}}[kind];speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=cfg.lang;u.rate=cfg.rate;u.pitch=1;u.voice=chooseVoice(cfg.lang,cfg.preferred);speechSynthesis.speak(u);$flash.textContent=cfg.label;$flash.classList.add('show');clearTimeout(window.__vf);window.__vf=setTimeout(()=> $flash.classList.remove('show'),700)}
  function shuffle(a){const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
  function pageItems(p){const s=p*PAGE_SIZE;return DATA.slice(s,s+PAGE_SIZE)} function getOrder(p){if(!pageOrders.has(p))pageOrders.set(p,pageItems(p));return pageOrders.get(p)} function setOrder(p,m){mode.set(p,m);pageOrders.set(p,m==='random'?shuffle(pageItems(p)):pageItems(p))}
  function markBrackets(text){return text.replace(/［([^］]+)］/g,'<span class="bracket">（$1）</span>').replace(/\[([^\]]+)\]/g,'<span class="bracket">（$1）</span>')}
  function makeCard(item){const card=document.createElement('article');card.className='card';const hold=document.createElement('button');hold.className='hold';hold.type='button';hold.draggable=false;const content=document.createElement('div');content.className='content';content.innerHTML=`<div class="meta"><span class="badge">${String(item.id).padStart(3,'0')}</span><span>${item.tag}</span></div><div class="jp">${markBrackets(item.jp)}</div><div class="en">${item.en}</div>`;const zones=document.createElement('div');zones.className='zones';['gb','in','us'].forEach(k=>{const b=document.createElement('button');b.className='zone';b.type='button';b.addEventListener('click',ev=>{ev.stopPropagation();speak(item.en,k)});zones.appendChild(b)});function on(){card.classList.add('reveal');hold.classList.add('on')}function off(){card.classList.remove('reveal');hold.classList.remove('on')}hold.addEventListener('pointerdown',e=>{e.preventDefault();hold.setPointerCapture?.(e.pointerId);on()});hold.addEventListener('pointerup',off);hold.addEventListener('pointercancel',off);hold.addEventListener('pointerleave',off);hold.addEventListener('touchstart',e=>{e.preventDefault();on()},{passive:false});hold.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});hold.addEventListener('touchend',off);hold.addEventListener('dragstart',e=>e.preventDefault());hold.addEventListener('selectstart',e=>e.preventDefault());hold.addEventListener('contextmenu',e=>e.preventDefault());card.append(hold,content,zones);return card}
  function renderTabs(){const pages=Math.ceil(DATA.length/PAGE_SIZE);$tabs.innerHTML='';for(let p=0;p<pages;p++){const b=document.createElement('button');b.className='tab'+(p===currentPage?' active':'');b.type='button';b.textContent=`${p*PAGE_SIZE+1}-${Math.min((p+1)*PAGE_SIZE,DATA.length)}`;b.onclick=()=>{currentPage=p;render()};$tabs.appendChild(b)}}
  function renderCards(){const items=getOrder(currentPage);$cards.innerHTML='';if(!items.length){$cards.innerHTML='<div class="empty">カードがありません</div>';return}const frag=document.createDocumentFragment();items.forEach(i=>frag.appendChild(makeCard(i)));$cards.appendChild(frag)}
  function updateControls(){const m=mode.get(currentPage)||'asc';$ascBtn.classList.toggle('active',m==='asc');$randBtn.classList.toggle('active',m==='random');$counter.textContent=`${currentPage*PAGE_SIZE+1}–${Math.min((currentPage+1)*PAGE_SIZE,DATA.length)} / ${DATA.length}`}
  function render(){renderTabs();updateControls();renderCards()}
  $ascBtn.onclick=()=>{setOrder(currentPage,'asc');render()};$randBtn.onclick=()=>{setOrder(currentPage,'random');render()};
  loadData().then(d=>{DATA=d;render()}).catch(err=>{$cards.innerHTML=`<div class="empty">読み込みに失敗しました。通信状況を確認して再読み込みしてください。<br>${err.message}</div>`});
})();
</script>
<script>if('serviceWorker'in navigator&&location.protocol!=='file:'){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}</script>
</body>
</html>
