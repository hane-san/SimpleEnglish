    .jp { font-size:10.55px; line-height:1.26; }
    .en { font-size:9.75px; line-height:1.32; }
    .hold::before { width:23px; height:23px; }
    .meta { font-size:9.45px; }
    .badge { min-width:26px; padding:2px 4px; }
  }

  .card:has(.hold.on) { border-color: rgba(20,43,70,.42); }
  .card.reveal { min-height:88px; }

":480,"tag":"過去","jp":"あなたが［時差による返信遅れを考慮して］変更した期限が、","en":"The deadline you changed to allow for delays caused by the time difference"},{"id":481,"tag":"現在進行","jp":"あなたが［今、海外チームと］確認している導入スケジュールが、","en":"The rollout schedule you’re checking with the overseas team now"},{"id":482,"tag":"現在進行","jp":"あなたが［現在、英国側の担当者と］調整している会議日程が、","en":"The meeting schedule you’re currently arranging with the UK contact"},{"id":483,"tag":"現在進行","jp":"あなたが［今週、現地代理店と］詰めている販売条件が、","en":"The sales terms you’re finalising with the local agent this week"},{"id":484,"tag":"現在完了進行","jp":"あなたが［ここ数日、海外拠点と］調整している移行計画が、","en":"The transition plan you’ve been coordinating with the overseas office over the past few days"},{"id":485,"tag":"現在完了進行","jp":"あなたが［今週ずっと］追跡している海外からの未回答問い合わせが、","en":"The outstanding overseas enquiries you’ve been tracking all week"},{"id":486,"tag":"過去完了","jp":"あなたが［国際会議の前にすでに］共有していた説明資料が、","en":"The briefing materials you had already shared before the international meeting"},{"id":487,"tag":"過去完了","jp":"あなたが［先方の方針変更前に］確認していた契約条件が、","en":"The contract terms you had checked before their change in policy"},{"id":488,"tag":"過去完了","jp":"あなたが［出荷遅延の連絡前に］準備していた代替案が、","en":"The alternative plan you had prepared before the shipping delay was reported"},{"id":489,"tag":"未来予定","jp":"あなたが［明日の海外会議前に］送ってくれる論点メモが、","en":"The issue note you’ll send before tomorrow’s international meeting"},{"id":490,"tag":"未来予定","jp":"あなたが［先方の回答後に］更新する予定の契約書案が、","en":"The draft contract you’re going to update after their response"},{"id":491,"tag":"予定・義務寄り","jp":"あなたが［金曜までに］提出することになっている英文レポートが、","en":"The English report you’re due to submit by Friday"},{"id":492,"tag":"未来予定","jp":"あなたが［海外チームの確認後に］差し替える予定の説明資料が、","en":"The briefing materials you’re going to replace after the overseas team’s review"},{"id":493,"tag":"現在完了","jp":"あなたが［ここまでの英語メールの流れを踏まえて］組み直した返信方針が、","en":"The reply strategy you’ve restructured based on the email exchange so far"},{"id":494,"tag":"過去","jp":"あなたが［相手に伝わる順番にするために］入れ替えた段落が、","en":"The paragraphs you reordered to make the message easier for them to follow"},{"id":495,"tag":"現在完了","jp":"あなたが［英語で読みやすくするために］短くした本文が、","en":"The main text you’ve shortened to make it easier to read in English"},{"id":496,"tag":"過去","jp":"あなたが［強すぎる印象を避けるために］言い換えた要求が、","en":"The request you rephrased to avoid sounding too forceful"},{"id":497,"tag":"現在完了","jp":"あなたが［国際業務で再利用できるように］整えてくれた英文テンプレートが、","en":"The English template you’ve refined for reuse in international work"},{"id":498,"tag":"過去","jp":"あなたが［確認漏れを防ぐために］追加した英文チェック項目が、","en":"The English check items you added to prevent anything being missed"},{"id":499,"tag":"現在完了","jp":"あなたが［最終確認用に］残してくれた英文コメントが、","en":"The English comment you’ve left for final review"},{"id":500,"tag":"直前完了","jp":"あなたが［500本ノックの最後に合わせて］作り直してくれた国際業務用の主語ブロックが、","en":"The international business subject block you’ve just recreated for the final part of the 500-drill set"}]</script>
<script>
(() => {
  const DATA = JSON.parse(document.getElementById('drill-data').textContent);
  const PAGE_SIZE = 50;
  const pageCount = Math.ceil(DATA.length / PAGE_SIZE);
  let currentPage = 0;
  const orders = new Map();
  const mode = new Map();

  const $tabs = document.getElementById('tabs');
  const $cards = document.getElementById('cards');
  const $counter = document.getElementById('counter');
  const $ascBtn = document.getElementById('ascBtn');
  const $randBtn = document.getElementById('randBtn');
  const $flash = document.getElementById('voiceflash');

  let voices = [];
  function loadVoices() {
    voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  }
  if ('speechSynthesis' in window) {
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
  }

  function pageLabel(i) {
    const start = i * PAGE_SIZE + 1;
    const end = Math.min((i + 1) * PAGE_SIZE, DATA.length);
    return `${start}-${end}`;
  }

  function baseItems(page) {
    const start = page * PAGE_SIZE;
    return DATA.slice(start, start + PAGE_SIZE);
  }

  function sortedItems(page) {
    return baseItems(page).slice().sort((a,b) => a.id - b.id);
  }

  function shuffledItems(page) {
    const arr = sortedItems(page);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function setOrder(page, newMode) {
    if (newMode === 'random') {
      orders.set(page, shuffledItems(page));
      mode.set(page, 'random');
    } else {
      orders.set(page, sortedItems(page));
      mode.set(page, 'asc');
    }
  }

  function getOrder(page) {
    if (!orders.has(page)) setOrder(page, 'asc');
    return orders.get(page);
  }

  function renderTabs() {
    $tabs.innerHTML = '';
    for (let i = 0; i < pageCount; i++) {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === currentPage ? ' active' : '');
      btn.type = 'button';
      btn.textContent = pageLabel(i);
      btn.addEventListener('click', () => {
        currentPage = i;
        render();
        btn.scrollIntoView({ inline:'center', block:'nearest', behavior:'smooth' });
      });
      $tabs.appendChild(btn);
    }
  }

  function showFlash(label) {
    $flash.textContent = label;
    $flash.classList.add('show');
    clearTimeout(showFlash._t);
    showFlash._t = setTimeout(() => $flash.classList.remove('show'), 700);
  }

  function selectVoice(lang, preferredNames = []) {
    if (!voices || voices.length === 0) loadVoices();
    const norm = x => String(x || '').toLowerCase();
    const exact = voices.filter(v => norm(v.lang) === norm(lang));
    const loose = voices.filter(v => norm(v.lang).startsWith(lang.slice(0,2).toLowerCase()));
    const pool = exact.length ? exact : loose;

    // Browser voices do not expose gender reliably, so we prioritise common male voice names.
    const maleHints = preferredNames.concat([
      'daniel','oliver','arthur','george','harry','ryan','thomas','fred','alex',
      'rishi','ravi','raj','aarav','amit','kunal','sanjay','male'
    ]).map(norm);

    const malePreferred = pool.find(v => maleHints.some(h => norm(v.name).includes(h)));
    if (malePreferred) return malePreferred;
    return pool[0] || null;
  }

  function speak(text, accent) {
    if (!('speechSynthesis' in window)) {
      showFlash('この端末は音声再生に未対応です');
      return;
    }
    const config = {
      gb: { lang:'en-GB', label:'UK male / en-GB', rate:0.96, preferred:['daniel','oliver','arthur','george','harry'] },
      in: { lang:'en-IN', label:'India male / en-IN', rate:1.04, preferred:['rishi','ravi','raj','aarav','amit','kunal'] },
      us: { lang:'en-US', label:'US natural / en-US', rate:0.96, preferred:['tom','alex','aaron','nathan','samantha','ava','allison'] }
    }[accent];

    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = config.lang;
    utter.rate = config.rate;
    utter.pitch = 1;
    utter.voice = selectVoice(config.lang, config.preferred || []);
    speechSynthesis.speak(utter);
    showFlash(config.label);
  }


  function highlightBrackets(text) {
    return escapeHtml(text).replace(/［([^］]+)］/g, '<span class="bracket">（$1）</span>').replace(/\[([^\]]+)\]/g, '<span class="bracket">（$1）</span>');
  }

  function makeCard(item) {
    const card = document.createElement('article');
    card.className = 'card';

    const hold = document.createElement('button');
    hold.className = 'hold';
    hold.type = 'button';
    hold.draggable = false;
    hold.textContent = '○';
    hold.setAttribute('aria-label', '英語を表示');

    const content = document.createElement('div');
    content.className = 'content';

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<span class="badge">${String(item.id).padStart(3,'0')}</span><span>${escapeHtml(item.tag)}</span>`;

    const jp = document.createElement('div');
    jp.className = 'jp';
    jp.innerHTML = highlightBrackets(item.jp);

    const en = document.createElement('div');
    en.className = 'en';
    en.textContent = item.en;

    content.appendChild(meta);
    content.appendChild(jp);
    content.appendChild(en);

    const zones = document.createElement('div');
    zones.className = 'zones';
    const accents = ['gb','in','us'];
    accents.forEach(acc => {
      const z = document.createElement('button');
      z.className = 'zone';
      z.type = 'button';
      z.setAttribute('aria-label', acc === 'gb' ? 'イギリス英語で再生' : acc === 'in' ? 'インド英語で再生' : 'アメリカ英語で再生');
      z.addEventListener('click', (e) => {
        e.preventDefault();
        speak(item.en, acc);
      });
      zones.appendChild(z);
    });

    const revealOn = (e) => {
      e.preventDefault();
      card.classList.add('reveal');
      hold.classList.add('on');
    };
    const revealOff = () => {
      card.classList.remove('reveal');
      hold.classList.remove('on');
    };

    hold.addEventListener('pointerdown', revealOn);
    hold.addEventListener('pointerup', revealOff);
    hold.addEventListener('pointercancel', revealOff);
    hold.addEventListener('pointerleave', revealOff);
    hold.addEventListener('touchstart', e => { e.preventDefault(); revealOn(e); }, { passive:false });
    hold.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
    hold.addEventListener('touchend', revealOff);
    hold.addEventListener('dragstart', e => e.preventDefault());
    hold.addEventListener('selectstart', e => e.preventDefault());
    hold.addEventListener('contextmenu', e => e.preventDefault());

    card.appendChild(hold);
    card.appendChild(content);
    card.appendChild(zones);
    return card;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }

  function renderCards() {
    const items = getOrder(currentPage);
    $cards.innerHTML = '';
    if (!items.length) {
      $cards.innerHTML = '<div class="empty">カードがありません</div>';
      return;
    }
    const frag = document.createDocumentFragment();
    items.forEach(item => frag.appendChild(makeCard(item)));
    $cards.appendChild(frag);
  }

  function updateControls() {
    const m = mode.get(currentPage) || 'asc';
    $ascBtn.classList.toggle('active', m === 'asc');
    $randBtn.classList.toggle('active', m === 'random');
    const start = currentPage * PAGE_SIZE + 1;
    const end = Math.min((currentPage + 1) * PAGE_SIZE, DATA.length);
    $counter.textContent = `${start}–${end} / ${DATA.length}`;
  }

  function render() {
    renderTabs();
    updateControls();
    renderCards();
  }

  $ascBtn.addEventListener('click', () => {
    setOrder(currentPage, 'asc');
    render();
  });
  $randBtn.addEventListener('click', () => {
    setOrder(currentPage, 'random');
    render();
  });

  render();
})();
</script>

<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
